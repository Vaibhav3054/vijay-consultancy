services:
  - type: web
    name: vijay-consultancy-crm
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/crm.db
      - key: JWT_SECRET
        generateValue: true
