<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vijay Consultancy</title>
  </head>
  <body>
    <script>
      window.addEventListener('error', (event) => {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:monospace;width:100%;height:100%;overflow:auto;"><h2>Global Error Caught!</h2><p>' + event.message + '</p><pre>' + (event.error ? event.error.stack : '') + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', (event) => {
        document.body.innerHTML += '<div style="position:fixed;top:0;left:0;z-index:9999;background:red;color:white;padding:20px;font-family:monospace;width:100%;height:100%;overflow:auto;"><h2>Unhandled Promise Rejection!</h2><p>' + event.reason + '</p><pre>' + (event.reason ? event.reason.stack : '') + '</pre></div>';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
